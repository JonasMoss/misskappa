name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cpp:
    name: C++ dev
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev --output-on-failure

  r:
    name: R package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Rcpp", "RcppEigen", "roxygen2", "testthat"))

      - name: Vendor C++ into the R package and verify it's committed
        run: |
          dev/vendor-cpp.sh
          if [ -n "$(git status --porcelain -- r-package/src)" ]; then
            echo "::error::r-package/src is out of sync with src/ + include/ — run 'just vendor' and commit."
            git status --porcelain -- r-package/src
            exit 1
          fi

      - name: Install local irrCAC smoke oracle (kept local; optional)
        run: |
          if [ -d dev/irrcacsmoke ]; then
            R CMD INSTALL --preclean dev/irrcacsmoke
          else
            echo "dev/irrcacsmoke not present (kept local, gitignored); irrCAC parity tests self-skip."
          fi

      - name: Generate R documentation
        shell: Rscript {0}
        run: roxygen2::roxygenise("r-package")

      - name: Check R package
        # This job stays lightweight: the Quarto vignette engine and the
        # heavier Suggests (lavaan, psych, quarto) are not installed here --
        # they are exercised by the Docs workflow. Skip building vignettes and
        # treat absent Suggests as a NOTE rather than an error.
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
        run: |
          cleanup() { rm -f misskappa_*.tar.gz; }
          cleanup
          trap cleanup EXIT
          R CMD build r-package --no-build-vignettes
          R CMD check --no-manual --no-build-vignettes misskappa_*.tar.gz
