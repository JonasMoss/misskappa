name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cpp:
    name: C++ dev
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev --output-on-failure

      # doctest's JUnit reporter writes one <testcase> per TEST_CASE (~125),
      # which is what Codecov Test Analytics consumes. Runs even on failure so
      # failing tests still get reported. The reporter writes only to --out, so
      # this is a second run (the suite is sub-5s); ctest above keeps the
      # human-readable console output.
      - name: Generate JUnit test report
        if: ${{ !cancelled() }}
        run: ./build-dev/tests/misskappa_tests --reporters=junit --out=cpp-junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cpp-junit.xml
          flags: cpp

  r:
    name: R package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Rcpp", "RcppEigen", "roxygen2", "testthat"))

      - name: Vendor C++ into the R package and verify it's committed
        run: |
          dev/vendor-cpp.sh
          if [ -n "$(git status --porcelain -- r-package/src)" ]; then
            echo "::error::r-package/src is out of sync with src/ + include/ — run 'just vendor' and commit."
            git status --porcelain -- r-package/src
            exit 1
          fi

      - name: Generate R documentation
        shell: Rscript {0}
        run: roxygen2::roxygenise("r-package")

      - name: Check R package
        # This job stays lightweight: the Quarto vignette engine and the
        # heavier Suggests (lavaan, psych, quarto) are not installed here --
        # they are exercised by the Docs workflow. Skip building vignettes and
        # treat absent Suggests as a NOTE rather than an error.
        env:
          _R_CHECK_FORCE_SUGGESTS_: "false"
        run: |
          cleanup() { rm -f misskappa_*.tar.gz; }
          cleanup
          trap cleanup EXIT
          R CMD build r-package --no-build-vignettes
          R CMD check --no-manual --no-build-vignettes misskappa_*.tar.gz

      # R CMD check ran the suite already; this re-runs it under the installed
      # package with testthat's JunitReporter so Codecov Test Analytics gets a
      # per-test report. stop_on_failure = FALSE lets the reporter flush the
      # XML first; we then exit non-zero ourselves so a real failure still reds
      # the job. Missing Suggests (lavaan/psych) self-skip, exactly as in the
      # check above.
      - name: Install package for test reporting
        if: ${{ !cancelled() }}
        run: R CMD INSTALL r-package

      - name: Generate JUnit test report
        if: ${{ !cancelled() }}
        shell: Rscript {0}
        run: |
          library(testthat)
          library(misskappa)
          # test_dir() chdir's into the test folder, so a relative reporter
          # path lands there, not at the repo root. Pin it absolutely.
          out <- file.path(getwd(), "r-junit.xml")
          results <- test_dir(
            "r-package/tests/testthat",
            package = "misskappa",
            reporter = JunitReporter$new(file = out),
            load_package = "installed",
            stop_on_failure = FALSE
          )
          df <- as.data.frame(results)
          if (sum(df$failed) > 0 || sum(df$error) > 0) quit(status = 1, save = "no")

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./r-junit.xml
          flags: r
