name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cpp:
    name: C++ dev
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Configure
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev --parallel

      - name: Test
        run: ctest --preset dev --output-on-failure

  r:
    name: R package
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Install R dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Rcpp", "RcppEigen", "testthat"))

      - name: Build opt library
        run: |
          cmake --preset opt
          cmake --build --preset opt --parallel

      - name: Install local irrCAC smoke oracle
        run: R CMD INSTALL --preclean dev/irrcacsmoke

      - name: Check R package
        run: |
          cleanup() { rm -f misskappa_*.tar.gz; }
          cleanup
          trap cleanup EXIT
          R CMD build r-package
          MISSKAPPA_INCLUDE="$PWD/include" \
          MISSKAPPA_LIB="$PWD/build-opt/libmisskappa.a" \
          R CMD check --no-manual misskappa_*.tar.gz
