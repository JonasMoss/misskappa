name: Docs

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            doxygen \
            g++ \
            libcurl4-openssl-dev \
            libeigen3-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libfribidi-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            libpng-dev \
            libtiff-dev \
            pandoc

      - name: Install R documentation dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Rcpp", "RcppEigen", "pkgdown", "quarto", "roxygen2", "psych"))

      - name: Build opt library
        run: |
          cmake --preset opt
          cmake --build --preset opt --parallel

      - name: Install the misskappa package
        # The R-executing articles call library(misskappa), so the package must
        # be installed for pkgdown's Quarto render sessions.
        run: R CMD INSTALL r-package

      - name: Build R documentation
        working-directory: r-package
        run: |
          roxygen2::roxygenise()
          pkgdown::build_site()
        shell: Rscript {0}

      - name: Build C++ documentation
        run: doxygen docs/Doxyfile

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && (github.ref_name == 'master' || github.ref_name == 'main') && vars.ENABLE_PAGES_DEPLOY == 'true'
    needs: build
    runs-on: ubuntu-24.04

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
