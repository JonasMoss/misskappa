name: Coverage

# Uploads two coverage reports to Codecov, each under its own flag:
#   * cpp -- the C++ doctest suite over src/ + include/ (gcc --coverage + gcovr)
#   * r   -- the R testthat suite via covr (also exercises the vendored C++
#            through Rcpp; reported under r-package/)
# Needs the repository secret CODECOV_TOKEN (required for private repos).

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cpp:
    name: C++ coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev gcovr

      - name: Build doctest suite with coverage instrumentation
        run: |
          cmake -S . -B build-cov -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-O0 -g --coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build-cov --parallel

      - name: Run tests
        run: ctest --test-dir build-cov --output-on-failure

      - name: Collect coverage (gcovr -> Cobertura)
        run: |
          gcovr build-cov --root . \
            --filter 'src/' --filter 'include/misskappa/' \
            --cobertura cpp-cobertura.xml --print-summary

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cpp-cobertura.xml
          flags: cpp
          fail_ci_if_error: false

  r:
    name: R coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libeigen3-dev

      - name: Install R dependencies
        shell: Rscript {0}
        # lavaan is intentionally omitted: one test compares against a lavaan
        # *internal* (lav_data_mi_patterns) that varies across lavaan versions.
        # Without lavaan it self-skips (skip_if_not_installed), matching ci.yml.
        run: |
          install.packages(c("Rcpp", "RcppEigen", "roxygen2", "testthat",
                             "covr", "psych"))

      - name: Vendor C++ into the R package
        run: dev/vendor-cpp.sh

      - name: Install local irrCAC smoke oracle (kept local; optional)
        run: |
          if [ -d dev/irrcacsmoke ]; then
            R CMD INSTALL --preclean dev/irrcacsmoke
          else
            echo "dev/irrcacsmoke not present (kept local, gitignored); irrCAC parity tests self-skip."
          fi

      - name: Generate R documentation
        shell: Rscript {0}
        run: roxygen2::roxygenise("r-package")

      - name: Collect coverage (covr -> Cobertura)
        shell: Rscript {0}
        run: |
          cov <- covr::package_coverage("r-package", type = "tests", quiet = FALSE)
          print(cov)
          covr::to_cobertura(cov, filename = "r-cobertura.xml")

      - name: Rewrite paths to repo-relative (package lives in r-package/)
        run: sed -i 's#filename="#filename="r-package/#g' r-cobertura.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./r-cobertura.xml
          flags: r
          fail_ci_if_error: false
