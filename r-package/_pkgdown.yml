url: https://jonasmoss.github.io/misskappa/
destination: ../docs/site

template:
  bootstrap: 5
  math-rendering: mathjax

navbar:
  structure:
    left: [intro, reference, articles, cpp]
    right: [github]
  components:
    cpp:
      text: C++ API
      href: cpp/

reference:
  - title: Estimators
    contents:
      - alpha
      - kappa
      - kappa_counts
      - ratings_to_counts
  - title: Hypothesis tests
    contents:
      - kappa_test
      - alpha_test
  - title: Inference
    contents:
      - confint.misskappa_estimate
      - influence.misskappa_estimate
  - title: Simulation helpers
    contents:
      - sim
  - title: Datasets
    contents:
      - starts_with("dat.")

articles:
  - title: How-to guides
    navbar: How-to
    contents:
      - articles/equality-tests
      - articles/gwise-agreement
  - title: Mathematical Guides
    navbar: Mathematical Guides
    contents:
      - articles/agreement-coefficients
      - articles/missingness-estimators
      - articles/validation
  - title: Frontier / experimental
    navbar: Frontier
    contents:
      - articles/vector-valued-agreement
